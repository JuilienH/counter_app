<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Offline Counter</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        :root {
            --bg-color: #f4f4f9;
            --text-color: #333;
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #121212;
                --text-color: #fff;
            }
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            height: 100vh;
            margin: 0;
            padding: 50px 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
        }
        .header {
            text-align: center;
            pointer-events: none;
        }
        h1 { font-size: 1.8rem; margin: 10px 0 5px 0; opacity: 0.8; }
        .instructions { font-size: 0.9rem; opacity: 0.5; }
        
        #counter { 
            font-size: 8rem; 
            font-weight: bold; 
            color: #007aff; 
            pointer-events: none; 
        }
        
        .btn-container { 
            display: flex; 
            justify-content: center;
            z-index: 10; 
        }
        button {
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.1s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        button:active { transform: scale(0.9); }
        .btn-reset { 
            background-color: #8e8e93; 
            color: white; 
            width: 65px; 
            height: 65px; 
            border-radius: 50%;
            font-size: 1.5rem; 
        }
    </style>
</head>
<body onclick="handleScreenTap()">

    <div class="header">
        <h1>Offline Counter</h1>
        <div class="instructions">Tap anywhere to count</div>
    </div>
    
    <div id="counter">0</div>
    
    <div class="btn-container" onclick="handleControlClick(event)">
        <button class="btn-reset" onclick="resetCount(event)">↺</button>
    </div>

    <script>
        let count = parseInt(localStorage.getItem('counter_val')) || 0;
        const counterEl = document.getElementById('counter');
        counterEl.innerText = count;

        const AudioContext = window.AudioContext || window.webkitAudioContext;
        const audioCtx = new AudioContext();

        function playLoudBeep() {
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
            
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            // 'triangle' waveform is significantly punchier and louder than 'sine'
            oscillator.type = 'triangle'; 
            // Higher pitch (880Hz) cuts through background noise much better
            oscillator.frequency.setValueAtTime(880, audioCtx.currentTime); 
            // Increased baseline volume gain to 0.4
            gainNode.gain.setValueAtTime(0.4, audioCtx.currentTime); 
            
            oscillator.start();
            // Sharp decay for a clean, loud click/pop effect
            gainNode.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 0.1);
            oscillator.stop(audioCtx.currentTime + 0.1);
        }

        function handleScreenTap() {
            count += 1;
            updateDisplay();
            playLoudBeep();
        }

        function resetCount(event) {
            event.stopPropagation(); // Prevents the reset tap from adding a count
            count = 0;
            updateDisplay();
            playLoudBeep();
        }

        function handleControlClick(event) {
            event.stopPropagation(); 
        }

        function updateDisplay() {
            counterEl.innerText = count;
            localStorage.setItem('counter_val', count);
        }

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>
</html>
