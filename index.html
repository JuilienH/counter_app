<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Offline Counter</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        :root {
            --bg-color: #f4f4f9;
            --text-color: #333;
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #121212;
                --text-color: #fff;
            }
        }
        /* The entire body is now the tap target */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            height: 100vh;
            margin: 0;
            padding: 40px 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
        }
        .header {
            text-align: center;
            pointer-events: none; /* Allows clicks to pass through to the body */
        }
        h1 { font-size: 1.8rem; margin: 10px 0 5px 0; opacity: 0.8; }
        .instructions { font-size: 0.9rem; opacity: 0.5; }
        
        #counter { 
            font-size: 7rem; 
            font-weight: bold; 
            color: #007aff; 
            pointer-events: none; 
        }
        
        .btn-container { 
            display: flex; 
            gap: 30px; 
            align-items: center; 
            z-index: 10; /* Ensures buttons stay on top of the background */
        }
        button {
            border: none;
            font-size: 2rem;
            width: 70px;
            height: 70px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.1s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        button:active { transform: scale(0.9); }
        .btn-minus { background-color: #ff3b30; color: white; }
        .btn-plus { background-color: #34c759; color: white; }
        .btn-reset { background-color: #8e8e93; color: white; width: 50px; height: 50px; font-size: 1.2rem; }
    </style>
</head>
<body onclick="handleScreenTap()">

    <div class="header">
        <h1>Offline Counter</h1>
        <div class="instructions">Tap anywhere to count</div>
    </div>
    
    <div id="counter">0</div>
    
    <div class="btn-container" onclick="handleControlClick(event)">
        <button class="btn-minus" onclick="changeCount(-1, event)">−</button>
        <button class="btn-reset" onclick="resetCount(event)">↺</button>
        <button class="btn-plus" onclick="changeCount(1, event)">+</button>
    </div>

    <script>
        let count = parseInt(localStorage.getItem('counter_val')) || 0;
        const counterEl = document.getElementById('counter');
        counterEl.innerText = count;

        // Create Web Audio Context for generating sound offline
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        const audioCtx = new AudioContext();

        function playBeepSound() {
            // iOS safety layer: Resume context if suspended
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
            
            // Build a quick synth beep dynamically
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            oscillator.type = 'sine';
            oscillator.frequency.setValueAtTime(580, audioCtx.currentTime); // Pitch of the beep
            gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime); // Volume
            
            oscillator.start();
            // Smooth fade out to prevent clicking sounds
            gainNode.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 0.08);
            oscillator.stop(audioCtx.currentTime + 0.08);
        }

        function handleScreenTap() {
            count += 1;
            updateDisplay();
            playBeepSound();
        }

        function changeCount(amount, event) {
            event.stopPropagation(); // Stops the full-screen tap from triggering
            count += amount;
            updateDisplay();
            playBeepSound();
        }

        function resetCount(event) {
            event.stopPropagation(); // Stops the full-screen tap from triggering
            count = 0;
            updateDisplay();
            playBeepSound();
        }

        function handleControlClick(event) {
            // Stops tapping the empty space between bottom buttons from incrementing
            event.stopPropagation(); 
        }

        function updateDisplay() {
            counterEl.innerText = count;
            localStorage.setItem('counter_val', count);
        }

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>
</html>
